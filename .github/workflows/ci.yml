name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }   # artipacked 방어(zizmor)
      - name: Set up uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "latest"
          enable-cache: true
          working-directory: game
          python-version: "3.13"
      - name: Install (locked)
        run: uv sync --locked --dev
      - name: Ruff lint (E9/F/B)
        run: uv run ruff check fatebound
      - name: Architecture (import-linter · core↛tui)
        run: uv run lint-imports
      - name: Actions security (zizmor · 워크플로 공급망)
        working-directory: ${{ github.workspace }}
        run: uvx zizmor --min-severity medium .github/workflows/
      - name: Dependency audit (pip-audit)
        run: uvx pip-audit
        continue-on-error: true   # 초기 비차단(보고만) → 신뢰 쌓이면 차단으로 ratchet

  test:
    name: test ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: game
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with: { persist-credentials: false }   # artipacked 방어(zizmor)

      - name: Set up uv  # v8도 가능 — 최신 태그 확인 후 bump
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "latest"
          enable-cache: true
          working-directory: game
          python-version: ${{ matrix.python }}

      - name: Install (locked)
        run: uv sync --locked --dev

      - name: Import sanity
        run: uv run python -c "import fatebound; print('import', fatebound.__version__)"

      - name: Unit tests (결정론·수식안전·C1 가드)
        run: uv run pytest -q

      - name: Selftest (데이터 번들·엔진 — frozen 경로와 동일)
        run: uv run python _entry.py --selftest
