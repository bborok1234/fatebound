version: 2
updates:
  # 파이썬 의존성(game/pyproject.toml · uv.lock)
  - package-ecosystem: "uv"
    directory: "/game"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions(워크플로) — 보안 업데이트 빠른 반영
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
