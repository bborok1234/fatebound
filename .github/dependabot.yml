version: 2
updates:
  # 파이썬 의존성(game/pyproject.toml · uv.lock)
  - package-ecosystem: "uv"
    directory: "/game"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions(워크플로) — 마이너/패치는 자동, 메이저는 수동 검토(release.yml은 tag-trigger라 동작 검증 필요).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
